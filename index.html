      async function fetchWeather(locationId) {
        try {
          const coords = LOCATION_COORDS[locationId];
          if (!coords) {
            throw new Error('未找到该城市坐标');
          }

          const [latitude, longitude] = coords;
          const url = new URL('https://api.open-meteo.com/v1/forecast');
          url.searchParams.append('latitude', latitude);
          url.searchParams.append('longitude', longitude);
          url.searchParams.append('current', 'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m');
          url.searchParams.append('daily', 'weather_code,temperature_2m_max,temperature_2m_min');
          url.searchParams.append('timezone', 'Asia/Shanghai');
          url.searchParams.append('forecast_days', '5');

          const response = await fetch(url.toString());
          if (!response.ok) {
            throw new Error('天气服务暂时不可用');
          }

          const apiData = await response.json();
          const current = apiData.current || {};
          const daily = apiData.daily || {};

          const weatherCode = current.weather_code || 0;
          const weatherDesc = WEATHER_CODE_DESCRIPTIONS[weatherCode] || "未知";

          const forecast = [];
          if (daily.time) {
            const dates = daily.time;
            const codes = daily.weather_code || [];
            const maxTemps = daily.temperature_2m_max || [];
            const minTemps = daily.temperature_2m_min || [];

            for (let i = 0; i < Math.min(5, dates.length); i++) {
              const dayCode = codes[i] || 0;
              const dayDesc = WEATHER_CODE_DESCRIPTIONS[dayCode] || "未知";
              forecast.push({
                date: dates[i],
                weather: dayDesc,
                max_temp: maxTemps[i] ? Math.round(maxTemps[i] * 10) / 10 : null,
                min_temp: minTemps[i] ? Math.round(minTemps[i] * 10) / 10 : null
              });
            }
          }

          const location = LOCATIONS.find(loc => loc.id === locationId);
          const data = {
            location: {
              province: "江西省",
              city: location ? location.city : "未知"
            },
            current: {
              temperature: Math.round((current.temperature_2m || 0) * 10) / 10,
              feels_like: Math.round((current.apparent_temperature || 0) * 10) / 10,
              humidity: current.relative_humidity_2m || 0,
              wind_speed: Math.round((current.wind_speed_10m || 0) * 10) / 10,
              weather: weatherDesc
            },
            forecast: forecast
          };

          displayWeather(data);
        } catch (error) {
          console.error('Fetch error:', error);
          displayError('无法获取天气数据，请稍后重试: ' + error.message);
        }
      }

      function displayWeather(data) {
        weatherDisplay.style.display = 'block';
        errorDisplay.style.display = 'none';

        document.getElementById('location-name').textContent = data.location.city;
        document.getElementById('current-temperature').textContent = data.current.temperature;
        document.getElementById('current-weather').textContent = data.current.weather;
        document.getElementById('feels-like').textContent = `${data.current.feels_like}°C`;
        document.getElementById('humidity').textContent = `${data.current.humidity}%`;
        document.getElementById('wind-speed').textContent = `${data.current.wind_speed} km/h`;

        const forecastList = document.getElementById('forecast-list');
        forecastList.innerHTML = '';
        data.forecast.forEach(day => {
          const item = document.createElement('div');
          item.className = 'forecast-item';
          item.innerHTML = `
            <div class="forecast-item__date">${day.date}</div>
            <div class="forecast-item__weather">${day.weather}</div>
            <div class="forecast-item__temp">
              <span class="temp-max">${day.max_temp}°</span>
              <span class="temp-sep">/</span>
              <span class="temp-min">${day.min_temp}°</span>
            </div>
          `;
          forecastList.appendChild(item);
        });
      }

      function displayError(message) {
        weatherDisplay.style.display = 'none';
        errorDisplay.style.display = 'block';
        document.getElementById('error-message').textContent = message;
      }

      // Event listeners
      citySearch.addEventListener('input', (e) => {
        filterLocations(e.target.value);
      });

      citySelect.addEventListener('change', () => {
        fetchWeather(citySelect.value);
      });

      refreshBtn.addEventListener('click', () => {
        fetchWeather(citySelect.value);
      });

      // Initialize
      populateSelect(allLocations);
      fetchWeather('nanchang');
    </script>
  </body>
</html>
